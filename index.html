<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Plants Gallery - Tirumala Nursery</title>
    <meta name="description" content="Tirumala Nursery Fruit Plants Gallery">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Floating side label on the right side of the page -->
    <div class="page-side-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 0a.5.5 0 0 1 .416.223l3 4.5A.5.5 0 0 1 11 5.5h-.098l2.022 3.235a.5.5 0 0 1-.424.765h-1.12l1.98 3.168A.5.5 0 0 1 12.936 13H9v2.5a.5.5 0 0 1-1 0V13H3.064a.5.5 0 0 1-.424-.768l1.98-3.168h-1.12a.5.5 0 0 1-.424-.765L5.098 5.5H5a.5.5 0 0 1-.416-.777l3-4.5A.5.5 0 0 1 8 0z"/>
        </svg>
        Tirumala Nursery
    </div>

    <!-- Main Gallery Section -->
    <section class="gallery-section">
        <img src="tirumala.jpg" alt="Tirumala Nursery Logo" class="nursery-logo fade-in-down">
        <div class="section-badge fade-in-down">FRUIT PLANTS</div>
        
        <div class="gallery-grid" id="gallery-grid">
            <!-- Fruit cards will be inserted here dynamically via JavaScript -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
